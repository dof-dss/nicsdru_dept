bulk select revisions:
  title: 'Allow bulk selection of revisions'

bulk delete newer revisions:
  title: 'Allow bulk deletion of newer revisions'
  description: 'Allows users to delete all revisions newer than the current revision.'

bulk delete older revisions:
  title: 'Allow bulk deletion of older revisions'
  description: 'Allows users to delete all revisions older than the current revision.'
